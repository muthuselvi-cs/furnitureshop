{% extends 'base.html' %}
{% block title %}Register | FurniWood{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="container">
        <div class="auth-card" style="max-width:500px;" data-aos="zoom-in">

            <!-- Header -->
            <div class="auth-card-header">
                <div class="mb-3">
                    <div style="width:60px;height:60px;background:rgba(255,255,255,.15);border-radius:var(--radius-sm);display:inline-flex;align-items:center;justify-content:center;">
                        <i class="fas fa-user-plus fa-2x text-white"></i>
                    </div>
                </div>
                <h3 class="fw-bold">Join Our Collection</h3>
                <p>Experience the elegance of premium wood furniture</p>
            </div>

            <!-- Body -->
            <div class="auth-card-body">
                {% if error %}
                <div class="alert alert-danger py-2 px-3 small mb-4">
                    <i class="fas fa-circle-xmark me-2"></i>{{ error }}
                </div>
                {% endif %}

                <form method="POST" action="{{ url_for('auth_routes.register') }}">

                    <div class="mb-3">
                        <label class="form-label">Full Name *</label>
                        <div class="input-group">
                            <span class="input-group-text border-end-0">
                                <i class="fas fa-user text-muted small"></i>
                            </span>
                            <input type="text" name="name"
                                   class="form-control border-start-0 ps-0"
                                   placeholder="John Doe" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email Address *</label>
                        <div class="input-group">
                            <span class="input-group-text border-end-0">
                                <i class="fas fa-envelope text-muted small"></i>
                            </span>
                            <input type="email" name="email"
                                   class="form-control border-start-0 ps-0"
                                   placeholder="john@example.com" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Phone Number</label>
                        <div class="input-group">
                            <span class="input-group-text border-end-0">
                                <i class="fas fa-phone text-muted small"></i>
                            </span>
                            <input type="text" name="phone"
                                   class="form-control border-start-0 ps-0"
                                   placeholder="+91 98765 43210">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Create Password *</label>
                        <div class="input-group">
                            <span class="input-group-text border-end-0">
                                <i class="fas fa-lock text-muted small"></i>
                            </span>
                            <input type="password" name="password"
                                   class="form-control border-start-0 ps-0"
                                   placeholder="Min. 8 characters" required>
                        </div>
                    </div>

                    <div class="mb-4 d-flex align-items-start gap-2">
                        <input type="checkbox" class="form-check-input mt-1 flex-shrink-0" id="terms" required>
                        <label class="form-check-label small text-muted" for="terms">
                            I agree to the
                            <a href="#" class="text-decoration-none text-accent">Terms &amp; Conditions</a>
                            and <a href="#" class="text-decoration-none text-accent">Privacy Policy</a>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-wood btn-lg w-100 mb-4">
                        <i class="fas fa-star me-2"></i>Create My Account
                    </button>

                    <div class="text-center">
                        <span class="text-muted small">Already a member? </span>
                        <a href="{{ url_for('auth_routes.login') }}"
                           class="small fw-bold text-decoration-none text-accent ms-1">
                            Login Now
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
