{% extends 'base.html' %}
{% block title %}Page Not Found | FurniWood{% endblock %}

{% block content %}
<div class="container py-5 text-center mt-4 mb-5">
    <div class="mb-4" data-aos="zoom-in">
        <div style="font-size: 8rem; line-height: 1; font-weight: 900; color: var(--light-wood); margin-bottom: -1rem;">404</div>
        <i class="fas fa-couch fa-4x" style="color: var(--accent-wood); position: relative; z-index: 10;"></i>
    </div>
    
    <h2 class="fw-bold mb-3" data-aos="fade-up" data-aos-delay="100">Oops! We can't find that page</h2>
    <p class="text-muted mb-4 lead mx-auto" style="max-width: 500px;" data-aos="fade-up" data-aos-delay="200">
        The page you're looking for seems to have been moved, deleted, or you might have mistyped the address.
    </p>
    
    <div class="d-flex justify-content-center gap-3 mt-4" data-aos="fade-up" data-aos-delay="300">
        <button onclick="window.history.back()" class="btn btn-wood-outline px-4 py-2">
            <i class="fas fa-arrow-left me-2"></i>Go Back
        </button>
        <a href="{{ url_for('store_routes.index') }}" class="btn btn-wood px-4 py-2">
            <i class="fas fa-home me-2"></i>Return Home
        </a>
    </div>
</div>
{% endblock %}
